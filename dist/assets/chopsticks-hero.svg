  <path d="M142 156c66 44 126 47 178 8M900 154c64 46 124 48 182 6M126 700c74-42 142-38 204 12M860 718c72-44 142-42 214 8" stroke="#6F8F58" stroke-opacity=".16" stroke-width="18" stroke-linecap="round"/>
  <path d="M170 128H1030V772H170V128Z" fill="url(#mat)" stroke="#C9B47D" stroke-opacity=".5" stroke-width="3"/>
  <path d="M214 172H986V728H214V172Z" stroke="#E9D8AF" stroke-width="2"/>
