<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Bamboo chopsticks with porcelain bowl</title>
  <desc id="desc">A refined bamboo and porcelain tabletop scene with natural chopsticks, a ceramic bowl, bamboo leaves, and a soft tea-table background.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F3E7"/>
      <stop offset=".55" stop-color="#E9DFC8"/>
      <stop offset="1" stop-color="#D7C59E"/>
    </linearGradient>
    <linearGradient id="mat" x1="154" y1="178" x2="1046" y2="760" gradientUnits="userSpaceOnUse">
