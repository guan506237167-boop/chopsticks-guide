      <stop offset=".28" stop-color="#D7AB5A"/>
      <stop offset=".6" stop-color="#A36E2E"/>
      <stop offset="1" stop-color="#6E421D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="160%">
